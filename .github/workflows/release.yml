name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          # Get latest version tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Previous tag: $LATEST_TAG"

          # Parse current version
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Analyze commits since last tag for conventional commit prefixes
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "$LATEST_TAG..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits. Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from commit messages
          BUMP="patch"
          while IFS= read -r msg; do
            if echo "$msg" | grep -qiE '^feat(\(.+\))?!:|^fix(\(.+\))?!:|^[a-z]+(\(.+\))?!:|BREAKING CHANGE'; then
              BUMP="major"
              break
            elif echo "$msg" | grep -qiE '^feat(\(.+\))?:'; then
              BUMP="minor"
            fi
          done <<< "$COMMITS"

          # Bump version
          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Bump: $BUMP -> v$NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        if: steps.version.outputs.skip != 'true'
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$CERTIFICATE_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/[\" ]//g')

          rm "$CERT_PATH"

          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Store notarization credentials
        if: steps.version.outputs.skip != 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "AC_PASSWORD" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build, sign, notarize, and package DMG
        if: steps.version.outputs.skip != 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          make release-dmg \
            VERSION=${{ steps.version.outputs.version }} \
            SIGNING_IDENTITY="Developer ID Application: Jan Philip Wahle ($APPLE_TEAM_ID)" \
            APPLE_ID="$APPLE_ID" \
            TEAM_ID="$APPLE_TEAM_ID" \
            KEYCHAIN_PROFILE=AC_PASSWORD

      - name: Verify Gatekeeper acceptance
        if: steps.version.outputs.skip != 'true'
        run: |
          spctl -a -vvv -t install "build/Apple Mail AI Plugin.app"
          spctl -a -vvv -t open --context context:primary-signature build/AIMailComposer.dmg

      - name: Clean up keychain
        if: always() && steps.version.outputs.skip != 'true'
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Apple Mail AI Plugin ${{ steps.version.outputs.tag }}
          files: build/AIMailComposer.dmg
          make_latest: true
          generate_release_notes: true
